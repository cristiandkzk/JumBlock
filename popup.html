<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        width: 260px;
        padding: 12px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 8px 0;
        font-size: 13px;
      }
      small {
        color: #666;
        display: block;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <h1>JumpBlock</h1>
    <label>YouTube <input type="checkbox" id="yt" /></label>
    <label>Twitch <input type="checkbox" id="tw" /></label>
    <label>Banners + pop-ups en otras webs <input type="checkbox" id="gen" /></label>
    <small id="status"></small>
    <script src="popup.js"></script>
  </body>
</html>
